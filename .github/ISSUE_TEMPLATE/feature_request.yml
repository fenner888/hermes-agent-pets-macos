name: Feature request
description: Suggest a new capability or improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or user need would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should happen?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Hermes plugin
        - macOS overlay
        - Pet assets
        - Custom pet workflow
        - Documentation
        - Install/release tooling
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
